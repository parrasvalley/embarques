<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Embarques - Parras Valley</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#0a0e1a;}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px;}
body{background:#0a0e1a;color:#e8edf5;font-family:system-ui,sans-serif;font-size:15px;min-height:100vh;}
input,select{width:100%;background:#0d1526;border:1.5px solid #1e3a5f;border-radius:8px;padding:10px 12px;color:#e8edf5;font-family:system-ui;font-size:14px;font-weight:600;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:#3b82f6;}
input::placeholder{color:#2a4a7a;}
select option{background:#0a0e1a;}
.lbl{font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#3b6aaa;margin-bottom:4px;display:block;}
.btn{padding:11px 16px;border:2px solid;border-radius:9px;font-family:system-ui;font-size:13px;font-weight:900;cursor:pointer;background:transparent;transition:all .15s;letter-spacing:.3px;}
.btn:active{transform:scale(.97);}
.btn-pri{border-color:#3b82f6;color:#3b82f6;}
.btn-pri:hover{background:rgba(59,130,246,.1);}
.btn-grn{border-color:#22c55e;color:#22c55e;}
.btn-grn:hover{background:rgba(34,197,94,.1);}
.btn-red{border-color:rgba(239,68,68,.4);color:#ef4444;}
.btn-gray{border-color:#1e3a5f;color:#4a6a9a;}
.btn-copy{border-color:rgba(167,139,250,.4);color:#a78bfa;}
.card{background:#0d1526;border:1.5px solid #1a2f50;border-radius:12px;padding:14px;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:900;letter-spacing:.5px;}
</style>
</head>
<body>
<div id="root"><div style="text-align:center;padding:60px;color:#3b82f6;font-family:sans-serif;font-size:16px;font-weight:700;background:#0a0e1a;min-height:100vh;">Cargando Embarques...</div></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var EMBAR_KEY="embarques-v1";
var PIN_EMB="1986";

function fbGet(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(k,v){return fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

function hoy(){var d=new Date();var dd=d.getDate();var mm=d.getMonth()+1;return(dd<10?"0":"")+dd+"/"+(mm<10?"0":"")+mm+"/"+d.getFullYear();}
function fechaISO(){var d=new Date();var mm=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+"-"+(mm<10?"0":"")+mm+"-"+(dd<10?"0":"")+dd;}
function hora(){var d=new Date();var h=d.getHours();var m=d.getMinutes();return(h<10?"0":"")+h+":"+(m<10?"0":"")+m;}

var CRUCES=["Nogales","McAllen","Laredo"];

var PRODUCTOS={
  Persa:{ranchos:["PVT","Cordillera","Forrajera"],pres:["20lb","12x1","8x2"],cals:["Primera","Segunda","Tercera"]},
  Slicer:{ranchos:["Forrajera","Cordillera"],pres:["62ct","18ct","24ct","36ct","25lb","50lb"],cals:["Superselecto","Selecto","Choice"]},
  Europeo:{ranchos:["Cordillera"],pres:["24ct","12ct","Caja 11B"],cals:["Primera","Segunda","Tercera"]},
  Morron:{ranchos:["Forrajera","Cordillera","Fepo"],pres:["L","XL","Jumbo","Verde 25lb"],cals:["Primera","Tercera"]},
  Minibel:{ranchos:["Cordillera","Forrajera"],pres:["12x8oz","12x1lb","18lb","Verde RPC"],cals:["Primera","Segunda"]}
};

var CLIENTES_BASE=["MamaMia","Wholesome","Leadway","DQP","Lakeway","Fresh Express","Sin especificar"];

function initLinea(){return{producto:"Persa",rancho:"PVT",malla:"",presentacion:"",calidad:"Primera",cliente:"",pallets:"",cajas:"",tipoProd:"Convencional"};}

function App(){
  var s1=useState(false);var auth=s1[0];var setAuth=s1[1];
  var s2=useState(false);var showPin=s2[0];var setShowPin=s2[1];
  var s3=useState("");var pinVal=s3[0];var setPinVal=s3[1];
  var s4=useState(false);var pinErr=s4[0];var setPinErr=s4[1];
  var s5=useState("nueva");var vista=s5[0];var setVista=s5[1];
  var s6=useState({linea:"",unidad:"",manifiesto:"",cruce:"Nogales",fecha:fechaISO()});var cab=s6[0];var setCab=s6[1];
  var s7=useState([initLinea()]);var lineas=s7[0];var setLineas=s7[1];
  var s8=useState([]);var historial=s8[0];var setHistorial=s8[1];
  var s9=useState(false);var guardando=s9[0];var setGuardando=s9[1];
  var s10=useState(null);var msg=s10[0];var setMsg=s10[1];
  var s11=useState("");var filtFecha=s11[0];var setFiltFecha=s11[1];
  var s12=useState(null);var detalle=s12[0];var setDetalle=s12[1];
  var s13=useState(null);var copiadoId=s13[0];var setCopiadoId=s13[1];

  useEffect(function(){
    fbGet(EMBAR_KEY).then(function(d){
      if(d&&typeof d==="object"){
        var arr=Array.isArray(d)?d:Object.values(d).filter(Boolean);
        arr.sort(function(a,b){return(b.ts||0)-(a.ts||0);});
        setHistorial(arr);
      }
    });
  },[]);

  function setCabF(k,v){setCab(function(c){return Object.assign({},c,{[k]:v});});}

  function setLineaF(i,k,v){
    setLineas(function(ls){
      var n=ls.map(function(l,idx){
        if(idx!==i)return l;
        var nu=Object.assign({},l);nu[k]=v;
        if(k==="producto"){nu.presentacion="";nu.calidad="Primera";nu.rancho=PRODUCTOS[v]&&PRODUCTOS[v].ranchos[0]||"";}
        return nu;
      });
      return n;
    });
  }

  function agregarLinea(){setLineas(function(ls){return ls.concat([initLinea()]);});}
  function quitarLinea(i){setLineas(function(ls){return ls.filter(function(_,idx){return idx!==i;});});}

  // Resumen por producto
  function resumen(){
    var r={};
    lineas.forEach(function(l){
      if(!l.producto||!l.cajas)return;
      if(!r[l.producto])r[l.producto]={cajas:0,pallets:0};
      r[l.producto].cajas+=parseInt(l.cajas)||0;
      r[l.producto].pallets+=parseInt(l.pallets)||0;
    });
    return r;
  }

  function totalCajas(){return lineas.reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);}

  // Generar texto del reporte
  function generarTexto(emb){
    var e=emb||{cab:cab,lineas:lineas};
    var c=e.cab;
    var txt="REPORTE DE CARGA\n";
    txt+="Fecha: "+c.fecha+"\n";
    if(c.linea)txt+="Linea: "+c.linea+"\n";
    if(c.unidad)txt+="Unidad: "+c.unidad+"\n";
    if(c.manifiesto)txt+="Manifiesto: "+c.manifiesto+"\n";
    if(c.cruce)txt+="Cruce: "+c.cruce+"\n";
    txt+="────────────────────\n";
    e.lineas.forEach(function(l){
      if(!l.cajas)return;
      txt+=l.producto+" "+l.rancho+" M"+l.malla+" "+l.presentacion+" "+l.calidad+" "+(l.tipoProd||"Conv")+" "+l.cliente+": "+l.pallets+" plt / "+l.cajas+" cjs\n";
    });
    txt+="────────────────────\n";
    var res={};
    e.lineas.forEach(function(l){if(!l.cajas)return;if(!res[l.producto])res[l.producto]=0;res[l.producto]+=parseInt(l.cajas)||0;});
    Object.keys(res).forEach(function(p){txt+=p.toUpperCase()+": "+res[p]+" cjs\n";});
    txt+="TOTAL: "+e.lineas.reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0)+" CAJAS";
    return txt;
  }

  function copiarTexto(emb){
    var txt=generarTexto(emb);
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){var id=emb&&emb.id||"nuevo";setCopiadoId(id);setTimeout(function(){setCopiadoId(null);},3000);});}
    else{var el=document.createElement("textarea");el.value=txt;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopiadoId("ok");}
  }

  function guardar(){
    var lineasValidas=lineas.filter(function(l){return l.cajas&&parseInt(l.cajas)>0;});
    if(!lineasValidas.length){setMsg("Agrega al menos una linea con cajas");setTimeout(function(){setMsg(null);},3000);return;}
    setGuardando(true);
    var nuevo={id:Date.now(),ts:Date.now(),cab:Object.assign({},cab),lineas:lineasValidas};
    var nuevaLista=[nuevo].concat(historial);
    fbSet(EMBAR_KEY,nuevaLista).then(function(){
      setHistorial(nuevaLista);
      setLineas([initLinea()]);
      setCab({linea:"",unidad:"",manifiesto:"",cruce:"Nogales",fecha:fechaISO()});
      setGuardando(false);
      setMsg("Carga registrada");setTimeout(function(){setMsg(null);},3000);
    });
  }

  function borrarEmb(id){
    var nueva=historial.filter(function(e){return e.id!==id;});
    fbSet(EMBAR_KEY,nueva).then(function(){setHistorial(nueva);setDetalle(null);});
  }

  var histFilt=filtFecha?historial.filter(function(e){return(e.cab&&e.cab.fecha||"").indexOf(filtFecha)>=0;}):historial;
  var sinp={width:"100%",background:"rgba(0,0,0,0.3)",border:"1px solid #1e3a5f",borderRadius:6,padding:"6px 8px",color:"#e8edf5",fontFamily:"system-ui",fontSize:12,outline:"none"};

  // DETALLE DE EMBARQUE
  if(detalle){
    var e=detalle;
    return(
      <div style={{background:"#0a0e1a",minHeight:"100vh",padding:"12px 14px 80px"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
          <button onClick={function(){setDetalle(null);}} className="btn btn-gray" style={{padding:"6px 12px"}}>Volver</button>
          <div style={{fontSize:16,fontWeight:900,color:"#3b82f6"}}>Detalle de carga</div>
          {auth&&<button onClick={function(){if(window.confirm("Borrar esta carga?"))borrarEmb(e.id);}} className="btn btn-red" style={{marginLeft:"auto",padding:"6px 12px",fontSize:12}}>Borrar</button>}
        </div>
        {/* Info del embarque */}
        <div className="card" style={{marginBottom:12,borderColor:"#1e3a5f"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><div className="lbl">Fecha</div><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{e.cab&&e.cab.fecha||"-"}</div></div>
            <div><div className="lbl">Cruce</div><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{e.cab&&e.cab.cruce||"-"}</div></div>
            <div><div className="lbl">Linea</div><div style={{fontSize:13,color:"#e8edf5"}}>{e.cab&&e.cab.linea||"-"}</div></div>
            <div><div className="lbl">Unidad</div><div style={{fontSize:13,color:"#e8edf5"}}>{e.cab&&e.cab.unidad||"-"}</div></div>
            <div><div className="lbl">Manifiesto</div><div style={{fontSize:13,color:"#e8edf5"}}>{e.cab&&e.cab.manifiesto||"-"}</div></div>
          </div>
        </div>
        {/* Lineas */}
        {(e.lineas||[]).map(function(l,i){
          return(
            <div key={i} className="card" style={{marginBottom:8,borderColor:"rgba(59,130,246,.2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:900,color:"#fff",marginBottom:2}}>{l.producto} - {l.presentacion}</div>
                  <div style={{fontSize:11,color:"#4a6a9a"}}>{l.rancho}{l.malla?" . M"+l.malla:""} . {l.calidad}</div>
                  <div style={{fontSize:11,color:"#4a6a9a"}}>{l.cliente}</div>
                  <span className="tag" style={{marginTop:3,background:l.tipoProd==="Organico"?"rgba(34,197,94,0.15)":"rgba(59,130,246,0.1)",color:l.tipoProd==="Organico"?"#22c55e":"#60a5fa",border:"1px solid "+(l.tipoProd==="Organico"?"rgba(34,197,94,0.3)":"rgba(59,130,246,0.2)")}}>{l.tipoProd||"Convencional"}</span>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:900,color:"#3b82f6",fontFamily:"Georgia,serif"}}>{l.cajas}</div>
                  <div style={{fontSize:10,color:"#4a6a9a"}}>{l.pallets} plt</div>
                </div>
              </div>
            </div>
          );
        })}
        {/* Total */}
        <div className="card" style={{marginBottom:12,borderColor:"rgba(34,197,94,.3)",background:"rgba(34,197,94,.04)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,color:"#22c55e",fontWeight:900,letterSpacing:1}}>TOTAL CARGA</div>
            <div style={{fontSize:28,fontWeight:900,color:"#22c55e",fontFamily:"Georgia,serif"}}>{(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0)} cjs</div>
          </div>
        </div>
        <button onClick={function(){copiarTexto(e);}} className="btn btn-copy" style={{width:"100%",padding:"12px",fontSize:14}}>
          {copiadoId===e.id?"Copiado!":"Copiar reporte para WhatsApp"}
        </button>
      </div>
    );
  }

  return(
    <div style={{background:"#0a0e1a",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"#0d1526",borderBottom:"2px solid #1a2f50",padding:"12px 14px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:17,fontWeight:900,color:"#e8edf5",letterSpacing:.3}}>Control de Embarques</div>
            <div style={{fontSize:9,color:"#2a4a7a",letterSpacing:3,fontWeight:700}}>PARRAS VALLEY TOMATOES</div>
          </div>
          <button onClick={function(){if(auth){setAuth(false);}else{setShowPin(true);}}} className={"btn "+(auth?"btn-grn":"btn-gray")} style={{padding:"6px 12px",fontSize:11}}>
            {auth?"Editor":"Lector"}
          </button>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={function(){setVista("nueva");}} style={{flex:1,padding:"8px",borderRadius:8,border:"2px solid "+(vista==="nueva"?"#3b82f6":"#1a2f50"),background:vista==="nueva"?"rgba(59,130,246,.1)":"transparent",color:vista==="nueva"?"#3b82f6":"#4a6a9a",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Nueva carga</button>
          <button onClick={function(){setVista("hist");}} style={{flex:1,padding:"8px",borderRadius:8,border:"2px solid "+(vista==="hist"?"#3b82f6":"#1a2f50"),background:vista==="hist"?"rgba(59,130,246,.1)":"transparent",color:vista==="hist"?"#3b82f6":"#4a6a9a",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Historial{historial.length>0?" ("+historial.length+")":""}</button>
        </div>
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"12px 14px 90px"}}>
        {msg&&<div style={{background:"rgba(59,130,246,.1)",border:"1px solid rgba(59,130,246,.3)",borderRadius:9,padding:"9px 14px",marginBottom:10,fontSize:13,color:"#3b82f6",fontWeight:700}}>{msg}</div>}

        {/* NUEVA CARGA */}
        {vista==="nueva"&&(
          <div>
            {/* Cabecera */}
            <div className="card" style={{marginBottom:12,borderColor:"rgba(59,130,246,.25)"}}>
              <div style={{fontSize:10,fontWeight:900,color:"#3b82f6",letterSpacing:2,marginBottom:10}}>DATOS DE LA CARGA</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div><span className="lbl">Fecha</span><input type="date" value={cab.fecha} onChange={function(e){setCabF("fecha",e.target.value);}}/></div>
                <div><span className="lbl">Cruce</span>
                  <select value={cab.cruce} onChange={function(e){setCabF("cruce",e.target.value);}}>
                    {CRUCES.map(function(c){return <option key={c}>{c}</option>;})}
                  </select>
                </div>
                <div><span className="lbl">Linea</span><input placeholder="Nombre transportista" value={cab.linea} onChange={function(e){setCabF("linea",e.target.value);}}/></div>
                <div><span className="lbl">Unidad</span><input placeholder="Clave del camion" value={cab.unidad} onChange={function(e){setCabF("unidad",e.target.value);}}/></div>
                <div style={{gridColumn:"span 2"}}><span className="lbl">Manifiesto</span><input placeholder="Numero de manifiesto" value={cab.manifiesto} onChange={function(e){setCabF("manifiesto",e.target.value);}}/></div>
              </div>
            </div>

            {/* Lineas de producto */}
            {lineas.map(function(l,i){
              var prod=PRODUCTOS[l.producto]||{ranchos:[],pres:[],cals:[]};
              return(
                <div key={i} className="card" style={{marginBottom:8,borderColor:"rgba(59,130,246,.15)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontSize:10,fontWeight:900,color:"#3b6aaa",letterSpacing:1}}>LINEA {i+1}</div>
                    {lineas.length>1&&<button onClick={function(){quitarLinea(i);}} style={{padding:"2px 8px",background:"transparent",border:"1px solid rgba(239,68,68,.3)",borderRadius:5,color:"#ef4444",fontSize:11,cursor:"pointer",fontFamily:"system-ui"}}>Quitar</button>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    <div><span className="lbl">Producto</span>
                      <select value={l.producto} onChange={function(e){setLineaF(i,"producto",e.target.value);}}>
                        {Object.keys(PRODUCTOS).map(function(p){return <option key={p}>{p}</option>;})}
                      </select>
                    </div>
                    <div><span className="lbl">Presentacion</span>
                      <select value={l.presentacion} onChange={function(e){setLineaF(i,"presentacion",e.target.value);}}>
                        <option value="">-- --</option>
                        {prod.pres.map(function(p){return <option key={p}>{p}</option>;})}
                      </select>
                    </div>
                    <div><span className="lbl">Rancho</span>
                      <select value={l.rancho} onChange={function(e){setLineaF(i,"rancho",e.target.value);}}>
                        {prod.ranchos.map(function(r){return <option key={r}>{r}</option>;})}
                      </select>
                    </div>
                    <div><span className="lbl">Malla</span>
                      <input placeholder="Ej: 5" value={l.malla} onChange={function(e){setLineaF(i,"malla",e.target.value);}}/>
                    </div>
                    <div><span className="lbl">Calidad</span>
                      <select value={l.calidad} onChange={function(e){setLineaF(i,"calidad",e.target.value);}}>
                        {prod.cals.map(function(c){return <option key={c}>{c}</option>;})}
                      </select>
                    </div>
                    <div><span className="lbl">Cliente</span>
                      <select value={l.cliente} onChange={function(e){setLineaF(i,"cliente",e.target.value);}}>
                        <option value="">-- --</option>
                        {CLIENTES_BASE.map(function(c){return <option key={c}>{c}</option>;})}
                      </select>
                    </div>
                    <div><span className="lbl">Pallets</span>
                      <input type="number" min="1" placeholder="0" value={l.pallets} onChange={function(e){setLineaF(i,"pallets",e.target.value);}}/>
                    </div>
                    <div><span className="lbl">Cajas</span>
                      <input type="number" min="1" placeholder="0" value={l.cajas} onChange={function(e){setLineaF(i,"cajas",e.target.value);}}/>
                    </div>
                    <div style={{gridColumn:"span 2"}}>
                      <span className="lbl">Tipo</span>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={function(){setLineaF(i,"tipoProd","Convencional");}} style={{flex:1,padding:"8px",borderRadius:7,border:"2px solid "+((!l.tipoProd||l.tipoProd==="Convencional")?"rgba(59,130,246,0.6)":"#1e3a5f"),background:(!l.tipoProd||l.tipoProd==="Convencional")?"rgba(59,130,246,0.12)":"transparent",color:(!l.tipoProd||l.tipoProd==="Convencional")?"#60a5fa":"#4a6a9a",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Convencional</button>
                        <button onClick={function(){setLineaF(i,"tipoProd","Organico");}} style={{flex:1,padding:"8px",borderRadius:7,border:"2px solid "+(l.tipoProd==="Organico"?"rgba(34,197,94,0.6)":"#1e3a5f"),background:l.tipoProd==="Organico"?"rgba(34,197,94,0.12)":"transparent",color:l.tipoProd==="Organico"?"#22c55e":"#4a6a9a",fontFamily:"system-ui",fontSize:12,fontWeight:900,cursor:"pointer"}}>Organico</button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}

            <button onClick={agregarLinea} className="btn btn-gray" style={{width:"100%",padding:"10px",marginBottom:12,fontSize:13}}>+ Agregar linea</button>

            {/* Resumen live */}
            {totalCajas()>0&&(
              <div className="card" style={{marginBottom:12,borderColor:"rgba(34,197,94,.25)",background:"rgba(34,197,94,.04)"}}>
                <div style={{fontSize:10,fontWeight:900,color:"#22c55e",letterSpacing:2,marginBottom:8}}>RESUMEN DE CARGA</div>
                {Object.keys(resumen()).map(function(p){
                  var r=resumen()[p];
                  return(
                    <div key={p} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13,color:"#e8edf5",fontWeight:700}}>{p}</span>
                      <span style={{fontSize:13,color:"#22c55e",fontWeight:900,fontFamily:"Georgia,serif"}}>{r.cajas} cjs / {r.pallets} plt</span>
                    </div>
                  );
                })}
                <div style={{borderTop:"1px solid rgba(34,197,94,.2)",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:14,fontWeight:900,color:"#fff"}}>TOTAL</span>
                  <span style={{fontSize:20,fontWeight:900,color:"#22c55e",fontFamily:"Georgia,serif"}}>{totalCajas()} cajas</span>
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){copiarTexto(null);}} className="btn btn-copy" style={{flex:1,padding:"12px",fontSize:13}}>
                {copiadoId==="nuevo"?"Copiado!":"Vista previa / Copiar"}
              </button>
              <button onClick={guardar} disabled={guardando} className="btn btn-grn" style={{flex:2,padding:"12px",fontSize:14}}>
                {guardando?"Guardando...":"Guardar carga"}
              </button>
            </div>
          </div>
        )}

        {/* HISTORIAL */}
        {vista==="hist"&&(
          <div>
            <div style={{marginBottom:10}}>
              <span className="lbl">Filtrar por fecha</span>
              <input style={sinp} placeholder="Ej: 2026-07-18" value={filtFecha} onChange={function(e){setFiltFecha(e.target.value);}}/>
            </div>
            {histFilt.length===0&&<div style={{textAlign:"center",padding:30,color:"#2a4a7a",fontSize:13}}>Sin cargas registradas</div>}
            {histFilt.map(function(e){
              var total=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
              var prods={};(e.lineas||[]).forEach(function(l){if(!prods[l.producto])prods[l.producto]=0;prods[l.producto]+=parseInt(l.cajas)||0;});
              return(
                <div key={e.id} className="card" style={{marginBottom:8,cursor:"pointer",borderColor:"rgba(59,130,246,.15)"}} onClick={function(){setDetalle(e);}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:900,color:"#fff",marginBottom:3}}>{e.cab&&e.cab.fecha||"Sin fecha"}</div>
                      <div style={{fontSize:11,color:"#4a6a9a"}}>{e.cab&&e.cab.cruce||""}{e.cab&&e.cab.linea?" . "+e.cab.linea:""}{e.cab&&e.cab.manifiesto?" . Man:"+e.cab.manifiesto:""}</div>
                      <div style={{fontSize:11,color:"#3b6aaa",marginTop:3}}>{Object.keys(prods).map(function(p){return p+": "+prods[p];}).join(" | ")}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:24,fontWeight:900,color:"#3b82f6",fontFamily:"Georgia,serif"}}>{total}</div>
                      <div style={{fontSize:9,color:"#4a6a9a",fontWeight:700}}>CAJAS</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* PIN */}
      {showPin&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#0d1526",border:"2px solid rgba(59,130,246,.4)",borderRadius:14,padding:"26px 22px",maxWidth:280,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:900,color:"#e8edf5",marginBottom:4}}>Control de Embarques</div>
            <div style={{fontSize:11,color:"#2a4a7a",marginBottom:18}}>PIN para editar</div>
            <input autoFocus type="password" value={pinVal}
              onChange={function(e){setPinVal(e.target.value);setPinErr(false);}}
              onKeyDown={function(e){if(e.key==="Enter"){if(pinVal===PIN_EMB){setAuth(true);setShowPin(false);setPinVal("");}else{setPinErr(true);setPinVal("");}}}}
              style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(pinErr?"#ef4444":"rgba(59,130,246,.4)"),borderRadius:9,padding:"10px",color:"#3b82f6",fontFamily:"Georgia,serif",fontSize:30,textAlign:"center",outline:"none",letterSpacing:6,marginBottom:pinErr?6:12}}/>
            {pinErr&&<div style={{color:"#ef4444",fontSize:11,fontWeight:700,marginBottom:8}}>PIN incorrecto</div>}
            <div style={{display:"flex",gap:7}}>
              <button onClick={function(){setShowPin(false);setPinVal("");}} className="btn btn-gray" style={{flex:1}}>Cancelar</button>
              <button onClick={function(){if(pinVal===PIN_EMB){setAuth(true);setShowPin(false);setPinVal("");}else{setPinErr(true);setPinVal("");} }} className="btn btn-pri" style={{flex:2}}>Entrar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
