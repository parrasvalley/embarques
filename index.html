<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Embarques - Parras Valley</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060d1a;color:#f0f4ff;font-family:system-ui,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#060d1a;} ::-webkit-scrollbar-thumb{background:#1a3060;border-radius:3px;}
.inp{width:100%;background:rgba(0,0,0,.4);border:2px solid #1a3060;border-radius:10px;padding:11px 13px;color:#f0f4ff;font-family:system-ui;font-size:14px;font-weight:700;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.inp:focus{border-color:#3b82f6;}
.inp::placeholder{color:#1a3060;}
.inp option{background:#0a1428;}
.lbl{font-size:9px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;display:block;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var EMBAR_KEY="embarques-v1";
var LINEAS_KEY="embarques-lineas-v1";
function fbGet(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(k,v){return fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}
function fechaISO(){var d=new Date();var mm=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+"-"+(mm<10?"0":"")+mm+"-"+(dd<10?"0":"")+dd;}

var LINEAS_BASE=["RM","Algeza","Arlequín","LL Logístic","JCV","Sodesa"];
var CRUCES=["Nogales","McAllen","Laredo"];
var PROD_COLORS={
  Persa:  {bg:"rgba(34,197,94,.1)",  border:"rgba(34,197,94,.4)",  text:"#22c55e"},
  Slicer: {bg:"rgba(59,130,246,.1)", border:"rgba(59,130,246,.4)", text:"#3b82f6"},
  Morron: {bg:"rgba(239,68,68,.1)",  border:"rgba(239,68,68,.4)",  text:"#ef4444"},
  Minibel:{bg:"rgba(168,85,247,.1)", border:"rgba(168,85,247,.4)", text:"#a855f7"},
  Europeo:{bg:"rgba(245,158,11,.1)", border:"rgba(245,158,11,.4)", text:"#f59e0b"}
};
var PRODS={
  "Persa Conv":   {base:"Persa",   tipo:"Convencional",pres:["20lb","12x1","8x2"],                                            cals:["Extra Fancy","Fancy","ML","MS"]},
  "Persa Org":    {base:"Persa",   tipo:"Organico",    pres:["20lb","12x1","8x2"],                                            cals:["Extra Fancy","Fancy","ML","MS"]},
  "Slicer Conv":  {base:"Slicer",  tipo:"Convencional",pres:["62ct","18ct","24ct","36ct","25lb","50lb"],                      cals:["Superselecto","Selecto","Choice"]},
  "Slicer Org":   {base:"Slicer",  tipo:"Organico",    pres:["62ct","18ct","24ct","36ct","25lb","50lb"],                      cals:["Superselecto","Selecto","Choice"]},
  "Morron Conv":  {base:"Morron",  tipo:"Convencional",pres:["L","XL","Jumbo","Verde 25lb"],                                  cals:["Primera","Tercera"]},
  "Morron Org":   {base:"Morron",  tipo:"Organico",    pres:["L","XL","Jumbo","Verde 25lb"],                                  cals:["Primera","Tercera"]},
  "Minibel Conv": {base:"Minibel", tipo:"Convencional",pres:["12x8oz","12x1lb","18lb","Verde RPC"],                           cals:["Primera","Segunda"]},
  "Minibel Org":  {base:"Minibel", tipo:"Organico",    pres:["12x8oz","12x1lb","18lb","Verde RPC"],                           cals:["Primera","Segunda"]},
  "Europeo Conv": {base:"Europeo", tipo:"Convencional",pres:["24 RPC Small","24 RPC Mediano","12 Small","12 Mediano","Bushel"],cals:["Primera","Segunda"]},
  "Europeo Org":  {base:"Europeo", tipo:"Organico",    pres:["24 RPC Small","24 RPC Mediano","12 Small","12 Mediano","Bushel"],cals:["Primera","Segunda"]}
};
function initCab(){return{fecha:"",linea:"",unidad:"",cruce:""};}
function initLinea(){return{producto:"",presentacion:"",calidad:"",cliente:"",pallets:"",cajas:""};}

function getCol(prod){var base=(PRODS[prod]||{}).base;return PROD_COLORS[base]||{bg:"rgba(59,130,246,.08)",border:"rgba(59,130,246,.25)",text:"#60a5fa"};}
function getCals(producto,presentacion){
  var p=PRODS[producto]||{};
  // Persa embolsado (12x1 o 8x2): solo Primera/Segunda
  if(p.base==="Persa"&&(presentacion==="12x1"||presentacion==="8x2")){
    return["Primera","Segunda"];
  }
  // Persa 20lb o sin presentacion: Extra Fancy, Fancy, ML, MS
  return p.cals||[];
}

function App(){
  // fase: "hist" | "header" | "lineas" | "resumen"
  var s1=useState("hist");var fase=s1[0];var setFase=s1[1];
  var s2=useState(initCab());var cab=s2[0];var setCab=s2[1];
  var s3=useState([]);var lineas=s3[0];var setLineas=s3[1];
  var s4=useState(initLinea());var lForm=s4[0];var setLForm=s4[1];
  var s5=useState([]);var hist=s5[0];var setHist=s5[1];
  var s6=useState(LINEAS_BASE.slice());var llista=s6[0];var setLlista=s6[1];
  var s7=useState(false);var showNL=s7[0];var setShowNL=s7[1];
  var s8=useState("");var nlVal=s8[0];var setNlVal=s8[1];
  var s9=useState(null);var detalle=s9[0];var setDetalle=s9[1];
  var s10=useState(null);var copId=s10[0];var setCopId=s10[1];
  var s11=useState("");var filtF=s11[0];var setFiltF=s11[1];
  var s12=useState(null);var errMsg=s12[0];var setErrMsg=s12[1];
  var s14=useState(null);var editando=s14[0];var setEditando=s14[1];
  var s17=useState(null);var editId=s17[0];var setEditId=s17[1];
  var s18=useState(null);var editLineaIdx=s18[0];var setEditLineaIdx=s18[1];
  var s19=useState(null);var editLineaData=s19[0];var setEditLineaData=s19[1];
  var s20=useState(false);var editCab=s20[0];var setEditCab=s20[1];
  var s21=useState(null);var editCabData=s21[0];var setEditCabData=s21[1];

  useEffect(function(){
    fbGet(EMBAR_KEY).then(function(d){
      if(d&&typeof d==="object"){
        var arr=Array.isArray(d)?d.filter(Boolean):Object.values(d).filter(Boolean);
        arr.sort(function(a,b){return(b.ts||0)-(a.ts||0);});
        setHist(arr);
      }
    });
    fbGet(LINEAS_KEY).then(function(d){if(d&&Array.isArray(d)&&d.length)setLlista(d);});
  },[]);

  function setCabF(k,v){setCab(function(c){var n=Object.assign({},c);n[k]=v;return n;});}
  function setLF(k,v){setLForm(function(f){var n=Object.assign({},f);n[k]=v;if(k==="producto"){n.presentacion="";n.calidad="";}if(k==="presentacion"){n.calidad="";}return n;});}

  function iniciarEmbarque(){
    if(!cab.fecha||!cab.linea||!cab.cruce){setErrMsg("Fecha, linea y cruce son obligatorios");setTimeout(function(){setErrMsg(null);},3000);return;}
    setLineas([]);setLForm(initLinea());setFase("lineas");
  }

  function agregarLinea(){
    if(!lForm.producto||!lForm.presentacion||!lForm.calidad||!lForm.cliente||!lForm.cajas){
      setErrMsg("Completa todos los campos antes de agregar");setTimeout(function(){setErrMsg(null);},3000);return;
    }
    setLineas(function(ls){return ls.concat([Object.assign({},lForm)]);});
    setLForm(initLinea());
  }

  function quitarLinea(i){setLineas(function(ls){return ls.filter(function(_,idx){return idx!==i;});});}

  function cerrarEmbarque(){
    var val=lineas.filter(function(l){return parseInt(l.cajas)>0;});
    if(!val.length){setErrMsg("Agrega al menos un producto antes de cerrar");setTimeout(function(){setErrMsg(null);},3000);return;}
    if(editId){guardarEdicion();return;}
    var nuevo={id:Date.now(),ts:Date.now(),cab:Object.assign({},cab),lineas:val};
    var lista=[nuevo].concat(hist);
    fbSet(EMBAR_KEY,lista).then(function(){
      setHist(lista);setDetalle(nuevo);
      setCab(initCab());setLineas([]);setLForm(initLinea());
      setFase("resumen");
    });
  }

  function addLineaTransporte(){
    if(!nlVal.trim())return;
    var nl=llista.concat([nlVal.trim()]);
    setLlista(nl);fbSet(LINEAS_KEY,nl);
    setCabF("linea",nlVal.trim());
    setNlVal("");setShowNL(false);
  }

  function genTexto(emb){
    var e=emb;var c=e.cab||{};
    var txt="PARRAS VALLEY TOMATOES\nREPORTE DE EMBARQUE\n";
    txt+="════════════════════════\n";
    if(c.fecha)txt+="Fecha:      "+c.fecha+"\n";
    if(c.linea)txt+="Linea:      "+c.linea+"\n";
    if(c.unidad)txt+="Unidad:     "+c.unidad+"\n";
    if(c.manifiesto)txt+="Manifiesto: "+c.manifiesto+"\n";
    if(c.cruce)txt+="Cruce:      "+c.cruce+"\n";
    txt+="────────────────────────\n";
    (e.lineas||[]).forEach(function(l,i){
      txt+=(i+1)+". "+l.producto+" · "+l.presentacion+" · "+l.calidad+"\n";
      txt+="   Cliente: "+l.cliente+"\n";
      if(l.manifiesto)txt+="   Manifiesto: "+l.manifiesto+"\n";
      txt+="   "+l.pallets+" pallets / "+l.cajas+" cajas\n";
    });
    txt+="════════════════════════\n";
    var tot=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
    var plts=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
    txt+="TOTAL: "+plts+" plt / "+tot+" cajas";
    return txt;
  }

  function copiar(emb){
    var txt=genTexto(emb);var id=emb&&emb.id||"x";
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){setCopId(id);setTimeout(function(){setCopId(null);},3000);});}
    else{var el=document.createElement("textarea");el.value=txt;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopId(id);}
  }

  function exportCSV(){
    var rows=[];
    rows.push(["PARRAS VALLEY TOMATOES","","","","","","","","",""]);
    rows.push(["HISTORIAL DE EMBARQUES","","","","","","","","",""]);
    rows.push(["Exportado:",new Date().toLocaleDateString("es-MX"),"","","","","","","",""]);
    rows.push([]);
    hist.forEach(function(e,ei){
      var cb=e.cab||{};
      // Encabezado del embarque
      rows.push(["EMBARQUE "+(ei+1),"","","","","","","","",""]);
      rows.push(["Fecha",cb.fecha||"","Linea",cb.linea||"","Cruce",cb.cruce||"","Unidad",cb.unidad||"","",""]);
      rows.push([]);
      // Agrupar por manifiesto
      var manMap={};var manOrder=[];
      (e.lineas||[]).forEach(function(l){
        var man=l.manifiesto||"Sin manifiesto";
        if(!manMap[man])manOrder.push(man);
        if(!manMap[man])manMap[man]=[];
        manMap[man].push(l);
      });
      manOrder.forEach(function(man){
        rows.push(["Manifiesto: "+man,"","","","","","","","",""]);
        rows.push(["Posicion","Producto","Presentacion","Calidad","Cliente","Pallets","Cajas","","",""]);
        manMap[man].forEach(function(l){
          rows.push([l.posicion||"",l.producto||"",l.presentacion||"",l.calidad||"",l.cliente||"",l.pallets||"",l.cajas||"","","",""]);
        });
        var mTot=manMap[man].reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
        var mPlt=manMap[man].reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
        rows.push(["Subtotal manifiesto","","","","",mPlt,mTot,"","",""]);
        rows.push([]);
      });
      var tot=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
      var plts=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
      rows.push(["TOTAL EMBARQUE","","","","",plts,tot,"","",""]);
      rows.push([]);rows.push([]);
    });
    // Generar HTML tabla para abrir en nueva ventana (funciona en iOS y desktop)
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Embarques PVT</title><style>';
    html+='body{font-family:Arial,sans-serif;font-size:12px;padding:15px;background:#fff;color:#111;}';
    html+='h1{font-size:16px;margin-bottom:4px;}h2{font-size:13px;color:#1a3a6a;margin:14px 0 4px;}';
    html+='h3{font-size:11px;color:#444;margin:8px 0 3px;font-weight:600;}';
    html+='.info{display:grid;grid-template-columns:repeat(4,auto);gap:4px 16px;margin-bottom:8px;}';
    html+='.lbl{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;}';
    html+='.val{font-size:12px;font-weight:700;color:#111;}';
    html+='table{width:100%;border-collapse:collapse;margin-bottom:6px;}';
    html+='th{background:#1a3a6a;color:#fff;padding:5px 8px;text-align:left;font-size:11px;}';
    html+='td{padding:4px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;}';
    html+='tr:hover td{background:#f0f4ff;}';
    html+='.tot{background:#f0f9ff;font-weight:700;border-top:2px solid #1a3a6a;}';
    html+='.sep{border-top:3px solid #1a3a6a;margin:16px 0 10px;}';
    html+='@media print{.no-print{display:none!important;}@page{margin:10mm;}}';
    html+='</style></head><body>';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html+='<div><h1>PARRAS VALLEY TOMATOES</h1><div style="font-size:11px;color:#888;">Historial de Embarques — Exportado '+new Date().toLocaleDateString("es-MX")+'</div></div>';
    html+='<button class="no-print" onclick="window.print()" style="padding:6px 14px;background:#1a3a6a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;">Imprimir / Guardar PDF</button>';
    html+='</div>';
    hist.forEach(function(e,ei){
      var cb=e.cab||{};
      html+='<div class="sep"></div>';
      html+='<h2>EMBARQUE '+(ei+1)+'</h2>';
      html+='<div class="info">';
      if(cb.fecha)html+='<div><div class="lbl">Fecha</div><div class="val">'+cb.fecha+'</div></div>';
      if(cb.linea)html+='<div><div class="lbl">Linea</div><div class="val">'+cb.linea+'</div></div>';
      if(cb.cruce)html+='<div><div class="lbl">Cruce</div><div class="val">'+cb.cruce+'</div></div>';
      if(cb.unidad)html+='<div><div class="lbl">Unidad</div><div class="val">'+cb.unidad+'</div></div>';
      html+='</div>';
      // Por manifiesto
      var manMap={};var manOrder=[];
      (e.lineas||[]).forEach(function(l){
        var man=l.manifiesto||"Sin manifiesto";
        if(!manMap[man])manOrder.push(man);
        if(!manMap[man])manMap[man]=[];
        manMap[man].push(l);
      });
      manOrder.forEach(function(man){
        var mTot=manMap[man].reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
        var mPlt=manMap[man].reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
        html+='<h3>Manifiesto: <b>'+man+'</b></h3>';
        html+='<table><tr><th>Posicion</th><th>Producto</th><th>Presentacion</th><th>Calidad</th><th>Cliente</th><th>Pallets</th><th>Cajas</th></tr>';
        manMap[man].forEach(function(l){
          html+='<tr><td>'+(l.posicion||"")+'</td><td>'+(l.producto||"")+'</td><td>'+(l.presentacion||"")+'</td><td>'+(l.calidad||"")+'</td><td>'+(l.cliente||"")+'</td><td style="text-align:center">'+(l.pallets||"")+'</td><td style="text-align:center;font-weight:700">'+(l.cajas||"")+'</td></tr>';
        });
        html+='<tr class="tot"><td colspan="5">Subtotal manifiesto '+man+'</td><td style="text-align:center">'+mPlt+' plt</td><td style="text-align:center">'+mTot+' cjs</td></tr>';
        html+='</table>';
      });
      var tot=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
      var plts=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
      html+='<div style="text-align:right;font-weight:700;font-size:13px;color:#1a3a6a;margin-top:4px;">TOTAL: '+plts+' pallets / '+tot+' cajas</div>';
    });
    html+='</body></html>';
    var blob=new Blob([html],{type:"text/html;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.target="_blank";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }

  function abrirVistaCom(emb){
    var e=emb;var cd=e.cab||{};
    var lineas=e.lineas||[];
    var tot=lineas.reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
    var plts=lineas.reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
    // Agrupar por manifiesto -> posicion -> cliente
    var manMap={};var manOrder=[];
    lineas.forEach(function(l){
      var man=l.manifiesto||"Sin manifiesto";
      var pos=l.posicion||"Sin posicion";
      var cli=l.cliente||"Sin cliente";
      if(!manMap[man]){manMap[man]={};manOrder.push(man);}
      if(!manMap[man][pos]){manMap[man][pos]={};}
      if(!manMap[man][pos][cli]){manMap[man][pos][cli]=[];}
      manMap[man][pos][cli].push(l);
    });
    var posOrder=["Termo","Entrega 2","Entrega 3","Entrega 4","Puerta"];
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>';
    html+='*{box-sizing:border-box;margin:0;padding:0;}';
    html+='body{background:#08121f;color:#f0f4ff;font-family:system-ui,sans-serif;padding:8px;}';

    html+='.card{background:#0a1628;border:2px solid #1a3a6a;border-radius:12px;overflow:hidden;max-width:420px;margin:0 auto;}';
    html+='.hdr{background:#0f2040;padding:10px 12px;border-bottom:2px solid #1a3a6a;}';

    html+='.hdr-cell{background:rgba(0,0,0,.4);border-radius:5px;padding:5px 8px;}';
    html+='.hdr-lbl{font-size:7px;font-weight:900;color:#2a5090;letter-spacing:1.5px;margin-bottom:1px;}';
    html+='.hdr-val{font-size:16px;font-weight:900;color:#fff;}';
    html+='.man-hdr{background:rgba(255,255,255,.09);padding:5px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);}';
    html+='.man-lbl{font-size:7px;font-weight:900;color:rgba(255,255,255,.4);letter-spacing:1.5px;}';
    html+='.man-num{font-size:16px;font-weight:900;color:#fff;}';
    html+='.man-tot{font-size:14px;font-weight:900;color:#60a5fa;font-family:Georgia,serif;}';
    html+='.pos-hdr{padding:4px 10px;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(255,255,255,.05);}';
    html+='.pos-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}';
    html+='.pos-lbl{font-size:10px;font-weight:900;letter-spacing:1px;}';

    html+='.cli-tot{font-size:8px;font-weight:900;writing-mode:vertical-rl;transform:rotate(180deg);margin-top:3px;}';
    html+='.prod-row{display:flex;align-items:center;padding:5px 8px;background:rgba(0,0,0,.15);border-bottom:1px solid rgba(255,255,255,.03);}';
    html+='.prod-bar{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;margin-right:7px;}';

    html+='.prod-det{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);line-height:1.2;}';
    html+='.prod-cjs{font-size:18px;font-weight:900;font-family:Georgia,serif;line-height:1;}';
    html+='.prod-plt{font-size:8px;color:rgba(255,255,255,.3);}';
    html+='.total{background:rgba(34,197,94,.1);border-top:1.5px solid rgba(34,197,94,.25);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}';

  function guardarCabEditada(embId){
    if(!editCabData)return;
    var actualizado=hist.map(function(e){
      if(e.id!==embId)return e;
      return Object.assign({},e,{cab:Object.assign({},editCabData)});
    });
    fbSet(EMBAR_KEY,actualizado).then(function(){
      setHist(actualizado);
      var det=actualizado.filter(function(e){return e.id===embId;})[0]||null;
      setDetalle(det);setEditCab(false);setEditCabData(null);
    });
  }

  function borrarEmb(id){
    if(!window.confirm("Borrar este embarque?"))return;
    var nueva=hist.filter(function(e){return e.id!==id;});
    fbSet(EMBAR_KEY,nueva).then(function(){setHist(nueva);setDetalle(null);setFase("hist");});
  }

  function editarEmb(emb){
    setCab(Object.assign({},emb.cab||{}));
    setLineas((emb.lineas||[]).concat([initLinea()]));
    setEditId(emb.id);
    setDetalle(null);
    setFase("lineas");
  }

  function guardarEdicion(){
    if(!lineas.filter(function(l){return parseInt(l.cajas)>0;}).length){
      setErrMsg("Agrega al menos una linea");setTimeout(function(){setErrMsg(null);},3000);return;
    }
    var val=lineas.filter(function(l){return parseInt(l.cajas)>0;});
    var actualizado=hist.map(function(e){
      if(e.id!==editId)return e;
      return Object.assign({},e,{cab:Object.assign({},cab),lineas:val});
    });
    fbSet(EMBAR_KEY,actualizado).then(function(){
      setHist(actualizado);
      var det=actualizado.filter(function(e){return e.id===editId;})[0]||null;
      setEditId(null);setCab(initCab());setLineas([initLinea()]);
      setDetalle(det);setFase(det?"resumen":"hist");
    });
  }

  function guardarLineaEditada(embId){
    if(!editLineaData)return;
    var actualizado=hist.map(function(e){
      if(e.id!==embId)return e;
      var nl=e.lineas.map(function(l,i){return i===editLineaIdx?Object.assign({},editLineaData):l;});
      return Object.assign({},e,{lineas:nl});
    });
    fbSet(EMBAR_KEY,actualizado).then(function(){
      setHist(actualizado);
      var det=actualizado.filter(function(e){return e.id===embId;})[0]||null;
      setDetalle(det);setEditLineaIdx(null);setEditLineaData(null);
    });
  }

  function eliminarLinea(embId,lineaIdx){
    if(!window.confirm("Eliminar esta linea del embarque?"))return;
    var actualizado=hist.map(function(e){
      if(e.id!==embId)return e;
      return Object.assign({},e,{lineas:e.lineas.filter(function(_,i){return i!==lineaIdx;})});
    });
    fbSet(EMBAR_KEY,actualizado).then(function(){
      setHist(actualizado);
      var det=actualizado.filter(function(e){return e.id===embId;})[0]||null;
      setDetalle(det);
    });
  }

<div>

            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"rgba(59,130,246,.15)",borderBottom:"2px solid rgba(59,130,246,.3)"}}>
                  {["Fecha","Linea","Unidad","Cruce","Manifiestos","Productos","Pallets","Cajas",""].map(function(h){return(
                    <th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:900,color:"#60a5fa",fontSize:11,letterSpacing:1,whiteSpace:"nowrap"}}>{h.toUpperCase()}</th>
                  );})}
                </tr>
              </thead>
              <tbody>
                {(filtF?hist.filter(function(e){return(e.cab&&e.cab.fecha||"").indexOf(filtF)>=0;}):hist).map(function(e,ri){
                  var cb=e.cab||{};
                  var tot=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.cajas)||0);},0);
                  var plt=(e.lineas||[]).reduce(function(s,l){return s+(parseInt(l.pallets)||0);},0);
                  var mans=[...new Set((e.lineas||[]).map(function(l){return l.manifiesto||"";}).filter(Boolean))];
                  var prods={};(e.lineas||[]).forEach(function(l){if(!prods[l.producto])prods[l.producto]=0;prods[l.producto]+=parseInt(l.cajas)||0;});
                  return(
                    <tr key={e.id} onClick={function(){setDetalle(e);}} style={{background:ri%2===0?"rgba(255,255,255,.02)":"rgba(255,255,255,.01)",borderBottom:"1px solid #0f2040",cursor:"pointer",transition:"background .1s"}}
                      onMouseEnter={function(ev){ev.currentTarget.style.background="rgba(59,130,246,.08)";}}
                      onMouseLeave={function(ev){ev.currentTarget.style.background=ri%2===0?"rgba(255,255,255,.02)":"rgba(255,255,255,.01)";}}>
                      <td style={{padding:"10px 12px",fontWeight:900,color:"#f0f4ff",whiteSpace:"nowrap"}}>{cb.fecha||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#60a5fa"}}>{cb.linea||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#8899bb"}}>{cb.unidad||"—"}</td>
                      <td style={{padding:"10px 12px",color:"#8899bb"}}>{cb.cruce||"—"}</td>
                      <td style={{padding:"10px 12px"}}>{mans.map(function(m){return(<span key={m} style={{display:"inline-block",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:5,padding:"1px 6px",marginRight:4,fontSize:11,fontWeight:700,color:"#fff"}}>{m}</span>);})}</td>
                      <td style={{padding:"10px 12px"}}><div style={{display:"flex",flexWrap:"wrap",gap:3}}>{Object.keys(prods).map(function(p){var col=getCol(p);return(<span key={p} style={{fontSize:10,fontWeight:800,color:col.text,background:col.bg,border:"1px solid "+col.border,borderRadius:5,padding:"1px 6px"}}>{p}: {prods[p]}</span>);})}</div></td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontWeight:700,color:"#8899bb"}}>{plt}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",fontSize:16,fontWeight:900,color:"#3b82f6",fontFamily:"Georgia,serif"}}>{tot}</td>
                      <td style={{padding:"10px 8px"}}><div style={{display:"flex",gap:4}}><button onClick={function(ev){ev.stopPropagation();setDetalle(e);}} style={{padding:"4px 10px",background:"rgba(59,130,246,.15)",border:"1px solid rgba(59,130,246,.3)",borderRadius:6,color:"#60a5fa",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui",whiteSpace:"nowrap"}}>Ver</button><button onClick={function(ev){ev.stopPropagation();editarEmb(e);}} style={{padding:"4px 10px",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.25)",borderRadius:6,color:"#60a5fa",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Editar</button><button onClick={function(ev){ev.stopPropagation();borrarEmb(e.id);}} style={{padding:"4px 10px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:6,color:"#ef4444",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Borrar</button></div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
