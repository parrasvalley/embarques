<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Inventario de Cargas - Parras Valley</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#e8edf2;color:#111;font-family:Arial,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:12px;height:12px;}
::-webkit-scrollbar-track{background:#ccc;}
::-webkit-scrollbar-thumb{background:#666;border-radius:4px;border:2px solid #ccc;}
.sel{width:100%;background:#fff;border:1.5px solid #aaa;border-radius:5px;padding:6px 8px;color:#111;font-family:Arial;font-size:13px;font-weight:700;outline:none;-webkit-appearance:none;appearance:none;}
.sel:focus{border-color:#1d4ed8;}
.tex{width:100%;background:#fff;border:1.5px solid #aaa;border-radius:5px;padding:6px 8px;color:#111;font-family:Arial;font-size:13px;font-weight:700;outline:none;}
.tex:focus{border-color:#1d4ed8;}
/* TABLA PRINCIPAL */
table.main{width:100%;border-collapse:collapse;font-size:11px;}
table.main th{background:#1a3a6a;color:#fff;padding:5px 7px;font-size:10px;font-weight:900;text-align:center;border:1px solid #0f2040;white-space:nowrap;letter-spacing:.3px;position:sticky;top:0;z-index:10;}
table.main td{padding:3px 7px;border:1px solid rgba(0,0,0,.12);vertical-align:middle;white-space:nowrap;}
table.main td.num{text-align:center;font-family:Georgia,serif;font-weight:900;}
table.main td.cen{text-align:center;}
table.main tr.sep td{height:3px;padding:0;border-left:none;border-right:none;}
/* Colores por bloque de linea - 6 paletas */
.bl0{background:#e8f0fe;} .bl0b{background:#d0e1fd;}
.bl1{background:#e6f4ea;} .bl1b{background:#ceead6;}
.bl2{background:#fef8e1;} .bl2b{background:#fdefc3;}
.bl3{background:#fce8f3;} .bl3b{background:#f8d0e8;}
.bl4{background:#e8f5f5;} .bl4b{background:#c8eaea;}
.bl5{background:#f3effe;} .bl5b{background:#e2d9fc;}
/* Botones */
.btn{padding:6px 14px;border-radius:7px;border:2px solid;font-size:12px;font-weight:900;cursor:pointer;font-family:Arial;}
.bn-blue{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
.bn-green{background:#16a34a;border-color:#16a34a;color:#fff;}
.bn-red{background:transparent;border-color:#dc2626;color:#dc2626;}
.bn-gray{background:transparent;border-color:#9ca3af;color:#374151;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var KEY="carga-lineas-v1";
var LCLAVE="carga-llista-v1";
var HCLAVE="carga-historial-v1";
function fbGet(k){return fetch(FB+"/"+k+".json").then(function(r){return r.json();}).catch(function(){return null;});}
function fbSet(k,v){return fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(function(){});}

var LINEAS_BASE=["RM","Algeza","Arlequin","LL Logistic","JCV","Sodesa"];
var CRUCES=["Nogales","McAllen","Laredo"];
var POSICIONES=["Termo","Entrega 2","Entrega 3","Entrega 4","Puerta"];

var PRODS={
  "Persa Conv":  {pres:["20lb","12x1","8x2"],cals:["Extra Fancy","Fancy","ML","MS"]},
  "Persa Org":   {pres:["20lb","12x1","8x2"],cals:["Extra Fancy","Fancy","ML","MS"]},
  "Slicer Conv": {pres:["62ct","18ct","24ct","36ct","25lb","50lb"],cals:["Superselecto","Selecto","Choice"]},
  "Slicer Org":  {pres:["62ct","18ct","24ct","36ct","25lb","50lb"],cals:["Superselecto","Selecto","Choice"]},
  "Morron Conv": {pres:["L","XL","Jumbo","Verde 25lb"],cals:["Primera","Tercera"]},
  "Morron Org":  {pres:["L","XL","Jumbo","Verde 25lb"],cals:["Primera","Tercera"]},
  "Minibel Conv":{pres:["12x8oz","12x1lb","18lb","Verde RPC"],cals:["Primera","Segunda"]},
  "Minibel Org": {pres:["12x8oz","12x1lb","18lb","Verde RPC"],cals:["Primera","Segunda"]},
  "Europeo Conv":{pres:["24 RPC S","24 RPC M","12 S","12 M","Bushel"],cals:["Primera","Segunda"]},
  "Europeo Org": {pres:["24 RPC S","24 RPC M","12 S","12 M","Bushel"],cals:["Primera","Segunda"]}
};
function getCals(prod,pres){
  var p=PRODS[prod]||{};
  if((prod||"").indexOf("Persa")>=0&&(pres==="12x1"||pres==="8x2"))return["Primera","Segunda"];
  if((prod||"").indexOf("Slicer")>=0&&pres==="50lb")return["Superselecto","Selecto","Large","Plain","Small"];
  if((prod||"").indexOf("Europeo")>=0&&pres==="Bushel")return["Tercera"];
  return p.cals||[];
}
function initFila(){return{linea:"",unidad:"",manifiesto:"",cruce:"",posicion:"",producto:"",presentacion:"",calidad:"",cliente:"",pallets:"",cajas:""};}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  var s1=useState([]);var filas=s1[0];var setFilas=s1[1];
  var s2=useState(initFila());var form=s2[0];var setForm=s2[1];
  var s3=useState(LINEAS_BASE.slice());var llista=s3[0];var setLlista=s3[1];
  var s4=useState(null);var editIdx=s4[0];var setEditIdx=s4[1];
  var s5=useState(null);var editDat=s5[0];var setEditDat=s5[1];
  var s6=useState("");var errMsg=s6[0];var setErrMsg=s6[1];
  var s7=useState(false);var guardando=s7[0];var setGuardando=s7[1];
  var s8=useState([]);var historial=s8[0];var setHistorial=s8[1];
  var s9=useState("captura");var vista=s9[0];var setVista=s9[1];

  useEffect(function(){
    fbGet(KEY).then(function(d){
      if(d&&Array.isArray(d))setFilas(d.filter(Boolean));
      else if(d&&typeof d==="object")setFilas(Object.values(d).filter(Boolean));
    });
    fbGet(LCLAVE).then(function(d){if(d&&Array.isArray(d)&&d.length)setLlista(d);});
    fbGet(HCLAVE).then(function(d){if(d&&Array.isArray(d))setHistorial(d.filter(Boolean));});
  },[]);

  function err(m){setErrMsg(m);setTimeout(function(){setErrMsg(null);},3000);}
  function setF(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;if(k==="producto"){n.presentacion="";n.calidad="";}if(k==="presentacion"){n.calidad="";}return n;});}
  function setE(k,v){setEditDat(function(f){var n=Object.assign({},f);n[k]=v;if(k==="producto"){n.presentacion="";n.calidad="";}if(k==="presentacion"){n.calidad="";}return n;});}

  function guardarFirebase(nuevas){
    setGuardando(true);
    fbSet(KEY,nuevas).then(function(){setGuardando(false);});
  }

  function agregarFila(){
    if(!form.linea||!form.producto||!form.presentacion||!form.calidad||!form.cliente||!form.cajas){
      err("Completa: Linea, Producto, Presentacion, Calidad, Cliente y Cajas");return;
    }
    var nuevas=filas.concat([Object.assign({},form,{id:Date.now()})]);
    setFilas(nuevas);
    guardarFirebase(nuevas);
    // Conservar solo linea, unidad, manifiesto y cruce — limpiar el resto
    setForm(function(f){return Object.assign({},initFila(),{
      linea:f.linea,unidad:f.unidad,manifiesto:f.manifiesto,cruce:f.cruce
    });});
  }

  function guardarCarga(){
    if(!filas.length){return;}
    if(!window.confirm("Guardar esta carga y limpiar la tabla?"))return;
    var registro={id:Date.now(),ts:Date.now(),fecha:new Date().toLocaleDateString("es-MX"),filas:filas.slice()};
    var nuevoHist=[registro].concat(historial);
    fbSet(HCLAVE,nuevoHist).then(function(){
      setHistorial(nuevoHist);
      setFilas([]);fbSet(KEY,[]);
    });
  }

  function borrarRegistro(id){
    if(!window.confirm("Borrar este registro del historial?"))return;
    var nuevo=historial.filter(function(h){return h.id!==id;});
    fbSet(HCLAVE,nuevo).then(function(){setHistorial(nuevo);});
  }

  function borrarFila(idx){
    if(!window.confirm("Borrar esta fila?"))return;
    var nuevas=filas.filter(function(_,i){return i!==idx;});
    setFilas(nuevas);guardarFirebase(nuevas);
  }

  function iniciarEdicion(idx){setEditIdx(idx);setEditDat(Object.assign({},filas[idx]));}
  function cancelarEdicion(){setEditIdx(null);setEditDat(null);}
  function guardarEdicion(){
    var nuevas=filas.map(function(f,i){return i===editIdx?Object.assign({},editDat):f;});
    setFilas(nuevas);guardarFirebase(nuevas);setEditIdx(null);setEditDat(null);
  }

  function exportarRegistro(reg){
    var filas=reg.filas||[];
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Inventario de Cargas PVT</title><style>';
    html+='body{font-family:Arial;font-size:11px;padding:10px;}';
    html+='h1{font-size:14px;color:#1a3a6a;text-align:center;margin-bottom:10px;}';
    html+='table{width:100%;border-collapse:collapse;}';
    html+='th{background:#1a3a6a;color:#fff;padding:5px 7px;font-size:10px;border:1px solid #0f2040;text-align:center;}';
    html+='td{padding:3px 7px;border:1px solid #ccc;font-size:11px;}';
    html+='@media print{@page{size:landscape;margin:8mm;}.np{display:none!important;}}';
    html+='</style></head><body>';
    html+='<h1>INVENTARIO DE CARGAS — PARRAS VALLEY TOMATOES<br><span style="font-size:10px;color:#666">'+new Date().toLocaleDateString("es-MX")+'</span></h1>';
    html+='<div class="np" style="text-align:right;margin-bottom:8px"><button onclick="window.print()" style="padding:5px 14px;background:#1a3a6a;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700">Imprimir / PDF</button></div>';
    html+='<table><thead><tr><th>LINEA</th><th>UNIDAD</th><th>MANIFIESTO</th><th>CRUCE</th><th>POSICION</th><th>PRODUCTO</th><th>PRESENTACION</th><th>CALIDAD</th><th>CLIENTE</th><th>PALLETS</th><th>CAJAS</th></tr></thead><tbody>';
    filas.forEach(function(f){
      html+='<tr><td>'+( f.linea||"")+'</td><td>'+(f.unidad||"")+'</td><td>'+(f.manifiesto||"")+'</td><td>'+(f.cruce||"")+'</td><td>'+(f.posicion||"")+'</td><td style="font-weight:700">'+(f.producto||"")+'</td><td>'+(f.presentacion||"")+'</td><td>'+(f.calidad||"")+'</td><td style="font-weight:700">'+(f.cliente||"")+'</td><td style="text-align:center">'+(f.pallets||"")+'</td><td style="text-align:center;font-weight:700;font-size:13px">'+(f.cajas||"")+'</td></tr>';
    });
    var totC=filas.reduce(function(s,f){return s+(parseInt(f.cajas)||0);},0);
    var totP=filas.reduce(function(s,f){return s+(parseInt(f.pallets)||0);},0);
    html+='<tr style="background:#1a3a6a;color:#fff;font-weight:700"><td colspan="9" style="padding:5px 7px">TOTAL GENERAL</td><td style="text-align:center">'+totP+'</td><td style="text-align:center;font-size:13px">'+totC+'</td></tr>';
    html+='</tbody></table></body></html>';
    var blob=new Blob([html],{type:"text/html;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.target="_blank";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }

  // ── Calcular colores automáticos ──────────────────────────────────────
  // Asignar índice de color a cada bloque de LINEA (cambio de linea = nuevo color)
  var lineaColorIdx={};var colorCnt=0;
  filas.forEach(function(f){
    if(lineaColorIdx[f.linea]===undefined){lineaColorIdx[f.linea]=colorCnt%6;colorCnt++;}
  });

  // Para cada fila: clase de color base y si el manifiesto cambió dentro del bloque = variante oscura
  var filasConColor=filas.map(function(f,i){
    var ci=lineaColorIdx[f.linea]||0;
    // Detectar si el manifiesto es diferente al anterior dentro de la misma linea
    var prev=i>0?filas[i-1]:null;
    var mismaLinea=prev&&prev.linea===f.linea;
    var mismoMan=mismaLinea&&prev.manifiesto===f.manifiesto;
    // Calcular alternancia de manifiesto dentro de la misma linea
    var manAlt=0;
    for(var j=0;j<i;j++){
      if(filas[j].linea===f.linea&&filas[j].manifiesto!==f.manifiesto){manAlt++;}
    }
    // Simplificado: alternar cada cambio de manifiesto
    var manDistinct=[];
    for(var k=0;k<=i;k++){
      if(filas[k].linea===f.linea){
        if(manDistinct.indexOf(filas[k].manifiesto)<0)manDistinct.push(filas[k].manifiesto);
      }
    }
    var manIdx=manDistinct.indexOf(f.manifiesto);
    var claseColor="bl"+ci+(manIdx%2===1?"b":"");
    var cambioLinea=!prev||prev.linea!==f.linea;
    var cambioMan=mismaLinea&&!mismoMan;
    return{fila:f,idx:i,clase:claseColor,cambioLinea:cambioLinea,cambioMan:cambioMan};
  });

  var totCajas=filas.reduce(function(s,f){return s+(parseInt(f.cajas)||0);},0);
  var totPallets=filas.reduce(function(s,f){return s+(parseInt(f.pallets)||0);},0);
  var pI=PRODS[form.producto]||{pres:[],cals:[]};
  var ePI=editDat?PRODS[editDat.producto]||{pres:[],cals:{}}:{pres:[],cals:[]};

  var selSt={width:"100%",background:"#fff",border:"1.5px solid #aaa",borderRadius:5,padding:"6px 8px",color:"#111",fontFamily:"Arial",fontSize:13,fontWeight:700,outline:"none",WebkitAppearance:"none",appearance:"none"};
  var texSt={width:"100%",background:"#fff",border:"1.5px solid #aaa",borderRadius:5,padding:"6px 8px",color:"#111",fontFamily:"Arial",fontSize:13,fontWeight:700,outline:"none"};
  var lbl={fontSize:9,fontWeight:900,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2,display:"block",color:"#555"};

  return(
    <div style={{background:"#e8edf2",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"#1a3a6a",padding:"9px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:16,fontWeight:900,color:"#fff",letterSpacing:.3}}>Inventario de Cargas</div>
          <div style={{fontSize:8,color:"#60a5fa",letterSpacing:3,fontWeight:900}}>PARRAS VALLEY TOMATOES</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {guardando&&<span style={{fontSize:11,color:"#93c5fd"}}>Guardando...</span>}
          <button className={"btn "+( vista==="captura"?"bn-blue":"bn-gray")} style={{color:"#fff",borderColor:"#fff"}} onClick={function(){setVista("captura");}}>Registro</button>
          <button className={"btn "+( vista==="historial"?"bn-blue":"bn-gray")} style={{color:"#fff",borderColor:"#fff"}} onClick={function(){setVista("historial");}}>Historial {historial.length>0?"("+historial.length+")":""}</button>
        </div>
      </div>

      <div style={{padding:"12px 14px"}}>

        {/* VISTA HISTORIAL */}
        {vista==="historial"&&(
          <div>
            {historial.length===0?(
              <div style={{textAlign:"center",padding:50,color:"#9ca3af",fontSize:14}}>Sin registros guardados</div>
            ):(
              <div>
                {historial.map(function(reg){
                  var totC=(reg.filas||[]).reduce(function(s,f){return s+(parseInt(f.cajas)||0);},0);
                  var totP=(reg.filas||[]).reduce(function(s,f){return s+(parseInt(f.pallets)||0);},0);
                  var unis={};(reg.filas||[]).forEach(function(f){if(f.unidad)unis[f.unidad]=1;});
                  return(
                    <div key={reg.id} style={{background:"#fff",borderRadius:10,border:"2px solid #c8d5e8",marginBottom:12,overflow:"hidden"}}>
                      <div style={{background:"#1a3a6a",padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:16,alignItems:"center"}}>
                          <span style={{fontSize:12,fontWeight:900,color:"#fff"}}>{reg.fecha}</span>
                          <span style={{fontSize:11,color:"#60a5fa"}}>Unidades: <b style={{color:"#fff"}}>{Object.keys(unis).length}</b></span>
                          <span style={{fontSize:11,color:"#60a5fa"}}>Pallets: <b style={{color:"#fff"}}>{totP}</b></span>
                          <span style={{fontSize:11,color:"#60a5fa"}}>Cajas: <b style={{color:"#fff",fontFamily:"Georgia",fontSize:13}}>{totC}</b></span>
                        </div>
                        <div style={{display:"flex",gap:8}}>
                          <button className="btn bn-gray" style={{padding:"4px 12px",fontSize:11,color:"#fff",borderColor:"#fff"}} onClick={function(){exportarRegistro(reg);}}>Exportar Excel</button>
                          <button className="btn bn-red" style={{padding:"4px 12px",fontSize:11,borderColor:"#fca5a5",color:"#fca5a5"}} onClick={function(){borrarRegistro(reg.id);}}>Borrar</button>
                        </div>
                      </div>
                      <div style={{overflowX:"auto"}}>
                        <table className="main" style={{fontSize:10}}>
                          <thead><tr><th>LINEA</th><th>UNIDAD</th><th>MANIFIESTO</th><th>CRUCE</th><th>POSICION</th><th>PRODUCTO</th><th>PRESENTACION</th><th>CALIDAD</th><th>CLIENTE</th><th>PALLETS</th><th>CAJAS</th></tr></thead>
                          <tbody>{(reg.filas||[]).map(function(f,i){return(
                            <tr key={i} style={{background:i%2===0?"#fff":"#f8faff"}}>
                              <td style={{fontWeight:900,color:"#1a3a6a"}}>{f.linea||"—"}</td>
                              <td>{f.unidad||"—"}</td>
                              <td style={{color:"#1d4ed8",fontWeight:700}}>{f.manifiesto||"—"}</td>
                              <td>{f.cruce||"—"}</td>
                              <td style={{textAlign:"center",fontSize:9,fontWeight:700}}>{f.posicion||"—"}</td>
                              <td style={{fontWeight:900}}>{f.producto||"—"}</td>
                              <td>{f.presentacion||"—"}</td>
                              <td>{f.calidad||"—"}</td>
                              <td style={{fontWeight:700}}>{f.cliente||"—"}</td>
                              <td style={{textAlign:"center",fontWeight:700}}>{f.pallets||"—"}</td>
                              <td style={{textAlign:"center",fontWeight:900,fontFamily:"Georgia,serif",fontSize:13}}>{f.cajas||"—"}</td>
                            </tr>
                          );})}</tbody>
                        </table>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* TABLA PRINCIPAL CON FORMULARIO COMO PRIMERA FILA */}
        {vista==="captura"&&<div>
        <div style={{background:"#fff",borderRadius:10,border:"2px solid #c8d5e8",overflow:"hidden"}}>
          {filas.length>0&&(
            <div style={{background:"#1a3a6a",padding:"5px 12px",display:"flex",gap:20,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#60a5fa",fontWeight:900}}>Unidades cargadas: {(function(){var us={};filas.forEach(function(f){if(f.unidad)us[f.unidad]=1;});return Object.keys(us).length;}())}</span>
              <span style={{fontSize:11,color:"#93c5fd"}}>Pallets: <b style={{color:"#fff"}}>{totPallets}</b></span>
              <span style={{fontSize:11,color:"#93c5fd"}}>Cajas: <b style={{color:"#fff",fontSize:13,fontFamily:"Georgia"}}>{totCajas}</b></span>
            </div>
          )}
          <div style={{overflowX:"auto"}}>
            <table className="main">
              <thead>
                <tr>
                  <th>LINEA</th><th>UNIDAD</th><th>MANIFIESTO</th><th>CRUCE</th>
                  <th>POSICION</th><th>PRODUCTO</th><th>PRESENTACION</th><th>CALIDAD</th>
                  <th>CLIENTE</th><th>PALLETS</th><th>CAJAS</th><th style={{width:70}}>ACCION</th>
                </tr>
                {/* FILA DE ENTRADA - HORIZONTAL */}
                <tr style={{background:"#f0f7ff"}}>
                  <td><select className="sel" value={form.linea} onChange={function(e){setF("linea",e.target.value);}}>
                    <option value="">--</option>{llista.map(function(l){return<option key={l}>{l}</option>;})}
                  </select></td>
                  <td><input className="tex" placeholder="..." value={form.unidad} onChange={function(e){setF("unidad",e.target.value);}}/></td>
                  <td><input className="tex" placeholder="..." value={form.manifiesto} onChange={function(e){setF("manifiesto",e.target.value);}}/></td>
                  <td><select className="sel" value={form.cruce} onChange={function(e){setF("cruce",e.target.value);}}>
                    <option value="">--</option>{CRUCES.map(function(c){return<option key={c}>{c}</option>;})}
                  </select></td>
                  <td><select className="sel" value={form.posicion} onChange={function(e){setF("posicion",e.target.value);}}>
                    <option value="">--</option>{POSICIONES.map(function(p){return<option key={p}>{p}</option>;})}
                  </select></td>
                  <td><select className="sel" value={form.producto} onChange={function(e){setF("producto",e.target.value);}}>
                    <option value="">--</option>{Object.keys(PRODS).map(function(p){return<option key={p}>{p}</option>;})}
                  </select></td>
                  <td><select className="sel" value={form.presentacion} onChange={function(e){setF("presentacion",e.target.value);}}>
                    <option value="">--</option>{pI.pres.map(function(p){return<option key={p}>{p}</option>;})}
                  </select></td>
                  <td><select className="sel" value={form.calidad} onChange={function(e){setF("calidad",e.target.value);}}>
                    <option value="">--</option>{getCals(form.producto,form.presentacion).map(function(c){return<option key={c}>{c}</option>;})}
                  </select></td>
                  <td><input className="tex" placeholder="..." value={form.cliente} onChange={function(e){setF("cliente",e.target.value);}}/></td>
                  <td><input className="tex" type="number" min="1" placeholder="..." value={form.pallets} style={{textAlign:"center",width:55}} onChange={function(e){setF("pallets",e.target.value);}}/></td>
                  <td><input className="tex" type="number" min="1" placeholder="..." value={form.cajas} style={{textAlign:"center",width:60,fontWeight:900}} onChange={function(e){setF("cajas",e.target.value);}}/></td>
                  <td className="cen">
                    <button className="btn bn-blue" style={{padding:"4px 10px",fontSize:11,whiteSpace:"nowrap"}} onClick={agregarFila}>+ Agregar</button>
                  </td>
                </tr>
                {errMsg&&<tr><td colSpan={12} style={{background:"#fef2f2",color:"#dc2626",fontWeight:700,fontSize:11,padding:"5px 10px"}}>{errMsg}</td></tr>}
              </thead>
              <tbody>
                {filas.length===0&&(
                  <tr><td colSpan={12} style={{textAlign:"center",padding:30,color:"#9ca3af",fontSize:13}}>Sin registros. Agrega la primera fila arriba.</td></tr>
                )}
                {(function(){
                  if(!filas.length)return null;
                  var grupos=[];
                  filas.forEach(function(f,i){
                    var clave=(f.linea||"")+"||"+(f.unidad||"");
                    if(grupos.length>0&&grupos[grupos.length-1].clave===clave){grupos[grupos.length-1].filas.push({f:f,idx:i});}
                    else{grupos.push({clave:clave,linea:f.linea||"—",unidad:f.unidad||"—",filas:[{f:f,idx:i}]});}
                  });
                  var BG=["#dbeafe","#dcfce7","#fef9c3","#fce7f3","#e0f2fe","#f3e8ff"];
                  var BGD=["#bfdbfe","#bbf7d0","#fde68a","#fbcfe8","#bae6fd","#e9d5ff"];
                  var rows=[];
                  grupos.forEach(function(g,gi){
                    var bg=BG[gi%BG.length];var bgd=BGD[gi%BGD.length];
                    var N=g.filas.length;
                    var totP=g.filas.reduce(function(s,r){return s+(parseInt(r.f.pallets)||0);},0);
                    var totC=g.filas.reduce(function(s,r){return s+(parseInt(r.f.cajas)||0);},0);
                    var manG=[];
                    g.filas.forEach(function(r){
                      var man=r.f.manifiesto||"—";
                      if(manG.length>0&&manG[manG.length-1].man===man){manG[manG.length-1].items.push(r);}
                      else{manG.push({man:man,items:[r]});}
                    });
                    var isFirst=true;
                    manG.forEach(function(mg,mgi){
                      var bgM=mgi%2===0?bg:bgd;
                      mg.items.forEach(function(r,li){
                        var i=r.idx;var f=r.f;
                        var esEdit=editIdx===i;
                        var ePI2=esEdit?PRODS[editDat.producto]||{pres:[],cals:[]}:{pres:[],cals:[]};
                        var isFM=li===0;
                        if(esEdit){
                          rows.push(<tr key={i+"-e"} style={{background:"#eff6ff"}}>
                            {isFirst&&<td rowSpan={N+1} style={{background:bg,fontWeight:900,fontSize:13,color:"#1a3a6a",textAlign:"center",verticalAlign:"middle",borderRight:"2px solid #93c5fd"}}>{g.linea}</td>}
                            {isFirst&&<td rowSpan={N+1} style={{background:bg,fontWeight:700,fontSize:12,textAlign:"center",verticalAlign:"middle",borderRight:"2px solid #93c5fd"}}>{g.unidad}</td>}
                            {isFM&&<td rowSpan={mg.items.length} style={{background:bgM,fontWeight:700,color:"#1d4ed8",textAlign:"center",verticalAlign:"middle"}}>{mg.man}</td>}
                            <td><select className="sel" value={editDat.cruce||""} onChange={function(e){setE("cruce",e.target.value);}}><option value="">--</option>{CRUCES.map(function(c){return<option key={c}>{c}</option>;})}</select></td>
                            <td><select className="sel" value={editDat.posicion||""} onChange={function(e){setE("posicion",e.target.value);}}><option value="">--</option>{POSICIONES.map(function(p){return<option key={p}>{p}</option>;})}</select></td>
                            <td><select className="sel" value={editDat.producto||""} onChange={function(e){setE("producto",e.target.value);}}><option value="">--</option>{Object.keys(PRODS).map(function(p){return<option key={p}>{p}</option>;})}</select></td>
                            <td><select className="sel" value={editDat.presentacion||""} onChange={function(e){setE("presentacion",e.target.value);}}><option value="">--</option>{ePI2.pres.map(function(p){return<option key={p}>{p}</option>;})}</select></td>
                            <td><select className="sel" value={editDat.calidad||""} onChange={function(e){setE("calidad",e.target.value);}}><option value="">--</option>{getCals(editDat.producto,editDat.presentacion).map(function(c){return<option key={c}>{c}</option>;})}</select></td>
                            <td><input className="tex" value={editDat.cliente||""} onChange={function(e){setE("cliente",e.target.value);}}/></td>
                            <td><input className="tex" type="number" value={editDat.pallets||""} style={{textAlign:"center",width:50}} onChange={function(e){setE("pallets",e.target.value);}}/></td>
                            <td><input className="tex" type="number" value={editDat.cajas||""} style={{textAlign:"center",width:55,fontWeight:900}} onChange={function(e){setE("cajas",e.target.value);}}/></td>
                            <td className="cen"><div style={{display:"flex",flexDirection:"column",gap:3}}>
                              <button className="btn bn-green" style={{padding:"2px 7px",fontSize:10}} onClick={guardarEdicion}>OK</button>
                              <button className="btn bn-gray" style={{padding:"2px 7px",fontSize:10}} onClick={cancelarEdicion}>✕</button>
                            </div></td>
                          </tr>);
                        }else{
                          rows.push(<tr key={i} style={{background:bgM}}>
                            {isFirst&&<td rowSpan={N+1} style={{background:bg,fontWeight:900,fontSize:14,color:"#1a3a6a",textAlign:"center",verticalAlign:"middle",borderRight:"2px solid #93c5fd"}}>{g.linea}</td>}
                            {isFirst&&<td rowSpan={N+1} style={{background:bg,fontWeight:700,fontSize:12,textAlign:"center",verticalAlign:"middle",borderRight:"2px solid #93c5fd"}}>{g.unidad}</td>}
                            {isFM&&<td rowSpan={mg.items.length} style={{background:bgM,fontWeight:700,color:"#1d4ed8",textAlign:"center",verticalAlign:"middle",fontSize:12}}>{mg.man}</td>}
                            <td>{f.cruce||"—"}</td>
                            <td className="cen" style={{fontSize:10,fontWeight:700}}>{f.posicion||"—"}</td>
                            <td style={{fontWeight:900}}>{f.producto||"—"}</td>
                            <td>{f.presentacion||"—"}</td>
                            <td>{f.calidad||"—"}</td>
                            <td style={{fontWeight:700}}>{f.cliente||"—"}</td>
                            <td className="num">{f.pallets||"—"}</td>
                            <td className="num" style={{fontSize:13}}>{f.cajas||"—"}</td>
                            <td className="cen"><div style={{display:"flex",gap:3,justifyContent:"center"}}>
                              <button className="btn bn-gray" style={{padding:"2px 6px",fontSize:10}} onClick={function(){iniciarEdicion(i);}}>✎</button>
                              <button className="btn bn-red" style={{padding:"2px 6px",fontSize:10}} onClick={function(){borrarFila(i);}}>✕</button>
                            </div></td>
                          </tr>);
                        }
                        isFirst=false;
                      });
                    });
                    rows.push(<tr key={"st"+gi} style={{background:bgd,borderTop:"1px solid #93a8d0"}}>
                      <td colSpan={7} style={{fontWeight:900,fontSize:11,color:"#1a3a6a",paddingLeft:10,letterSpacing:.5}}>SUBTOTAL — {g.linea} · {g.unidad}</td>
                      <td className="num" style={{fontWeight:900,fontSize:13,color:"#1a3a6a"}}>{totP}</td>
                      <td className="num" style={{fontWeight:900,fontSize:15,color:"#1a3a6a"}}>{totC}</td>
                      <td></td>
                    </tr>);
                    if(gi<grupos.length-1)rows.push(<tr key={"sp"+gi}><td colSpan={12} style={{height:4,padding:0,background:"#1a3a6a",border:"none"}}></td></tr>);
                  });
                  rows.push(<tr key="tgen" style={{background:"#1a3a6a"}}>
                    <td colSpan={9} style={{color:"#fff",fontWeight:900,fontSize:11,padding:"5px 7px",letterSpacing:1}}>TOTAL GENERAL</td>
                    <td className="num" style={{color:"#93c5fd",fontSize:13}}>{totPallets}</td>
                    <td className="num" style={{color:"#93c5fd",fontSize:15}}>{totCajas}</td>
                    <td></td>
                  </tr>);
                  return rows;
                })()}
              </tbody>
            </table>
          </div>
        </div>
          {filas.length>0&&(
            <div style={{padding:"10px 0 0"}}>
              <button className="btn bn-green" style={{width:"100%",padding:"13px",fontSize:15,letterSpacing:.5}} onClick={guardarCarga}>
                Guardar carga — {(function(){var u={};filas.forEach(function(f){if(f.unidad)u[f.unidad]=1;});return Object.keys(u).length;}())} unidades · {totPallets} pallets · {totCajas} cajas
              </button>
            </div>
          )}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
